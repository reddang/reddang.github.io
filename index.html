<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDDANG | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="shortcut icon" type="image/png" href="assets/images/favicon.png">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <h1 class="section-title">Portfolio.</h1>

        <!-- Bộ lọc giữ nguyên -->
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="business">Business Insight</button>
            <button class="filter-btn" data-filter="uxui">UX/UI</button>
            <button class="filter-btn" data-filter="3d">3D</button>
            <button class="filter-btn" data-filter="graphic">Graphic Design</button>
            <button class="filter-btn" data-filter="others">Others</button>
            <!-- ... các nút khác ... -->
        </div>

        <!-- KHU VỰC TRỐNG ĐỂ JS ĐỔ DỮ LIỆU VÀO -->
        <div class="portfolio-grid" id="portfolio-container">
            <!-- JS sẽ tự sinh code vào đây -->
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="script.js"></script>
</body>
</html>
